name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  # renovate: datasource=go depName=github.com/gohugoio/hugo versioning=node
  HUGO_VERSION: '0.163.1'

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: npm ci

      - run: npm run check:scripts

      - name: Prepare Standard.site records
        run: node scripts/sync-standard-site.ts --dry

      - run: hugo

  diff:
    if: github.event_name == 'pull_request' && (github.head_ref == 'renovate/github.com-gohugoio-hugo-0.x' || github.head_ref == 'renovate/github.com-adityatelange-hugo-papermod-digest')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: base
          ref: ${{ github.base_ref }}

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build with PR changes
        run: hugo
        working-directory: ./pr

      - name: Build at base
        run: hugo
        working-directory: ./base

      - name: Generate diff
        run: |
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          diff -r base/public pr/public >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  publish:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: standard-site
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: npm ci

      - run: npm run check:scripts

      - name: Sync Standard.site records
        run: node scripts/sync-standard-site.ts
        env:
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}

      - run: hugo

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Manual tarball creation to work around https://github.com/actions/upload-pages-artifact/issues/129
      # upload-pages-artifact v4 excludes all dotfiles, breaking .well-known support
      # Based on https://github.com/actions/upload-pages-artifact/blob/main/action.yml
      # but without the --exclude=".[^/]*" that removes dotfiles
      - name: Archive artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory ./public \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
